name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write   # required by claude-code-action@v1 OIDC token exchange

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       github.event.issue.pull_request)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # action diffs against origin/main; shallow clone breaks its fetch
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Review this PR for:
            1. Security issues (OWASP top 10, hardcoded secrets, injection, XSS)
            2. Correctness (edge cases, error handling, type safety)
            3. Performance (N+1 queries, unnecessary re-renders, memory leaks)
            4. Test coverage (are new features tested?)

            Format your review as:
            ## Claude Code Review
            **Security**: PASS/WARN/FAIL
            **Correctness**: PASS/WARN/FAIL
            **Performance**: PASS/WARN/FAIL
            **Tests**: PASS/WARN/FAIL

            ### Issues Found
            - List each issue with file:line reference

            ### Suggestions
            - List non-blocking improvements

            Be concise. Focus on real issues, not style nitpicks.
